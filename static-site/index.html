<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Bingo</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="main center">
    <div class="bg-blob">
      <div class="blob1"></div>
      <div class="blob2"></div>
    </div>
    <div class="max-w-md space-y-8 text-center">
      <div class="space-y-4">
        <div class="glass-strong rounded-2xl p-4 inline-flex items-center justify-center">
          <img src="logo.png" alt="Human Bingo" width="72" height="72" style="object-fit: contain;" />
        </div>
        <div>
          <h1 class="font-title text-3xl text-foreground">Human Bingo</h1>
          <p class="text-sm text-muted mt-2">Mark off moments. First to BINGO wins.</p>
        </div>
      </div>
      <form id="joinForm" class="glass-strong p-6 rounded-2xl space-y-4">
        <p class="text-sm text-foreground" style="opacity: 0.9;">Enter your name. No code needed—everyone plays together.</p>
        <div>
          <input type="text" id="nameInput" class="input" placeholder="Your name" autocomplete="name" />
        </div>
        <div id="errorBox" class="error-box" style="display: none;"></div>
        <button type="submit" id="playBtn" class="btn btn-primary btn-lg btn-block">
          <span id="playBtnText">Play</span>
        </button>
      </form>
      <div class="glass-secondary pills rounded-2xl">
        <div class="pill"><span class="emoji">🎮</span><br><span class="label">Easy</span></div>
        <div class="pill"><span class="emoji">👥</span><br><span class="label">Shared</span></div>
        <div class="pill"><span class="emoji">🎉</span><br><span class="label">Fun</span></div>
      </div>
      <p class="text-sm text-muted">For fun and laughter with friends</p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/join.js"></script>
</body>
</html>
