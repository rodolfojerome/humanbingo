<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Bingo – Play</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="main" id="main">
    <div class="bg-blob">
      <div class="blob1"></div>
    </div>
    <div id="loading" class="center">
      <div class="loading">
        <div class="spinner"></div>
        <span class="text-lg">Loading game...</span>
      </div>
    </div>
    <div id="notFound" class="center" style="display: none;">
      <div class="max-w-md space-y-4 text-center">
        <p class="text-lg text-muted">Game not found</p>
        <a href="index.html" class="btn btn-outline rounded-xl">Back Home</a>
      </div>
    </div>
    <div id="game" style="display: none;">
      <div class="max-w-2xl mx-auto mb-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="glass-strong rounded-xl p-2 w-10 h-10 flex items-center justify-center">
              <img src="logo.png" alt="" width="36" height="36" style="object-fit: contain;" />
            </div>
            <div>
              <h1 class="font-title text-xl">Human Bingo</h1>
              <p class="text-xs text-muted">Code: <span id="sessionCode"></span></p>
            </div>
          </div>
          <div class="flex gap-2 items-center">
            <button type="button" id="soundBtn" class="btn btn-outline rounded-xl" title="Toggle sound">🔊</button>
            <span id="bingoBadge" class="text-accent font-bold text-sm" style="display: none;">BINGO! — Say it out loud!</span>
          </div>
        </div>
        <div id="promptCard" class="glass-strong p-5 rounded-2xl mt-4" style="display: none;">
          <p class="text-xs text-muted mb-1">Current prompt</p>
          <p class="text-lg font-semibold" id="currentPromptText"></p>
          <p class="text-xs text-muted mt-2">Round <span id="roundNum"></span> of <span id="totalRounds"></span></p>
          <p id="nextMessage" class="mt-3 py-2 px-3 text-accent font-medium text-center text-sm rounded-xl" style="display: none; background: rgba(217,119,6,0.15);"></p>
          <button type="button" id="nextPromptBtn" class="btn btn-outline w-full mt-4 rounded-xl">
            Next prompt — not on your card? Skip & explain to the group!
          </button>
        </div>
      </div>
      <div class="max-w-2xl mx-auto">
        <div class="flex justify-end mb-3">
          <button type="button" id="refreshCardBtn" class="btn btn-outline btn-sm rounded-xl">
            Next bingo card (refresh unmarked slots)
          </button>
        </div>
        <div id="bingoGrid" class="bingo-grid"></div>
        <div id="hostControls" class="glass-strong p-6 space-y-3 rounded-2xl" style="display: none;">
          <a id="dashboardLink" href="#" class="btn btn-primary btn-block h-12 rounded-xl">View Host Dashboard</a>
          <a href="index.html" class="btn btn-outline btn-block h-12 rounded-xl">Exit Game</a>
        </div>
        <div id="confessionCard" class="glass-strong p-6 rounded-2xl space-y-4 mb-8" style="display: none;">
          <h2 class="text-2xl font-bold text-accent">🎉 BINGO! 🎉</h2>
          <p class="text-lg font-semibold">Say BINGO out loud!</p>
          <p>Congratulations <span id="playerNameEl"></span>!</p>
          <p class="text-sm text-muted">Tell your confession — it will be saved and you'll see your embarrassing moments list.</p>
          <textarea id="confessionInput" class="input" rows="3" placeholder="What's your confession related to this game?"></textarea>
          <button type="button" id="submitConfessionBtn" class="btn btn-primary w-full h-12 rounded-xl">Submit Confession</button>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/play.js"></script>
</body>
</html>
